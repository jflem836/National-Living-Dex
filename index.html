<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Living Dex Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Pokemon National Living Dex Tracker</h1>
      <p id="completion">Caught: 0/0 | Shiny: 0/0</p>
      <div class="profile-controls">
        <label for="profileSelect">Profile:</label>
        <select id="profileSelect"></select>
        <button id="newProfileBtn" type="button">New Profile</button>
        <button id="renameProfileBtn" type="button">Rename</button>
        <button id="deleteProfileBtn" type="button">Delete</button>
      </div>
      <div class="progress-section">
        <div class="progress-header">
          <span>Living Dex Progress</span>
          <span id="progress-text">0 / 0</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>
      <input type="text" id="search" placeholder="Search Pokemon..." />
      <div class="app-container">
        <div class="filters-panel">
          <div class="region-filter">
            <h2>Filters</h2>

            <button id="clear-filters">Clear Filters</button> <br />
            <br />
            <label for="filter">Filter:</label>
            <select id="filter">
              <option value="all">All</option>
              <option value="caught">Caught</option>
              <option value="not-caught">Not Caught</option>
              <option value="shiny">Shiny</option>
            </select>

            <p>Region</p>
            <label class="filter-option"
              ><input type="checkbox" class="region-checkbox" value="kanto" />
              Kanto</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="region-checkbox" value="johto" />

            <label class="filter-option"
              ><input type="checkbox" class="region-checkbox" value="galar" />

            >
            <label class="filter-option"
              ><input type="checkbox" class="region-checkbox" value="paldea" />
              Paldea</label
            >
          </div>
          <div class="type-filter">
            <p>Type</p>
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="normal" />
              Normal</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="fighting" />
              Fighting</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="flying" />
              Flying</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="poison" />

            >
            <label class="filter-option"

            >
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="fairy" />

        <div class="main-content">
          <div id="availability-summary" class="availability-summary">
            <div class="summary-card">
              <span class="summary-label">Obtainable</span>
              <span id="shown-count" class="summary-value">0</span>
            </div>

            <div class="summary-card">
              <span class="summary-label">Unavailable</span>
              <span id="hidden-count" class="summary-value">0</span>
            </div>

            <div class="summary-card">
              <span class="summary-label">Total</span>
              <span id="total-count" class="summary-value">0</span>
            </div>
          </div>

          <div class="progress-section obtainable-progress-section">
            <div class="progress-header">
              <span>Obtainable Progress</span>
              <span id="obtainable-progress-text">0 / 0</span>
            </div>
            <div class="progress-bar">
              <div id="obtainable-progress-fill" class="progress-fill"></div>
            </div>
          </div>

          <section class="pokemon-section">
            <h2>Obtainable</h2>
            <div id="pokemon-list"></div>
          </section>

          <section class="pokemon-section">
            <h2>Unavailable</h2>
            <div id="unavailable-pokemon-list"></div>
          </section>
        </div>

        <div id="pokemon-details" class="details-panel">
          <p>Select a Pokemon's info button to see details.</p>
        </div>
      </div>
