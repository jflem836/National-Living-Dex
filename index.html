<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon Living Dex Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Pokemon National Living Dex Tracker</h1>
      <p id="completion">Caught: 0/0 | Shiny: 0/0</p>
      <div class="progress-section">
        <div class="progress-header">
          <span>Living Dex Progress</span>
          <span id="progress-text">0 / 0</span>
        </div>
        <div class="progress-bar">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>
      <input type="text" id="search" placeholder="Search pokemon..." />
      <div class="app-container">
        <div class="filters-panel">
          <button id="clear-filters">Clear Filters</button> <br />
          <br />
          <label for="filter">Filter:</label>
          <select id="filter">
            <option value="all">All</option>
            <option value="caught">Caught</option>
            <option value="not-caught">Not Caught</option>
            <option value="shiny">Shiny</option>
          </select>
          <div class="region-filter">
            <p>Region</p>
            <label class="filter-option"
              ><input type="checkbox" class="region-checkbox" value="kanto" />
              Kanto</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="region-checkbox" value="johto" />
              Johto</label
            >
          </div>
          <div class="type-filter">
            <p>Type</p>
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="grass" />
              Grass</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="fire" />
              Fire</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="water" />
              Water</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="electric" />
              Electric</label
            >
            <label class="filter-option"
              ><input type="checkbox" class="type-checkbox" value="poison" />
              Poison</label
            >
          </div>
          <div class="filter-group">
            <p>Games</p>
            <label class="filter-option"
              ><input
                type="checkbox"
                class="game-checkbox"
                value="Pokemon Red"
              />
              Pokemon Red</label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                class="game-checkbox"
                value="Pokemon FireRed"
              />
              Pokemon FireRed</label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                class="game-checkbox"
                value="Pokemon HeartGold"
              />
              Pokemon HeartGold</label
            >
            <label class="filter-option"
              ><input
                type="checkbox"
                class="game-checkbox"
                value="Pokemon Scarlet"
              />
              Pokemon Scarlet</label
            >
          </div>

          <div class="filter-group">
            <p>Consoles</p>

            <label class="filter-option">
              <input
                type="checkbox"
                class="console-checkbox"
                value="Game Boy"
              />
              Game Boy
            </label>

            <label class="filter-option">
              <input
                type="checkbox"
                class="console-checkbox"
                value="Game Boy Advance"
              />
              Game Boy Advance
            </label>

            <label class="filter-option">
              <input
                type="checkbox"
                class="console-checkbox"
                value="Nintendo DS"
              />
              Nintendo DS
            </label>

            <label class="filter-option">
              <input
                type="checkbox"
                class="console-checkbox"
                value="Nintendo Switch"
              />
              Nintendo Switch
            </label>
          </div>
        </div>

        <div class="main-content">
          <div id="availability-summary" class="availability-summary">
            <div class="summary-card">
              <span class="summary-label">Obtainable</span>
              <span id="shown-count" class="summary-value">0</span>
            </div>

            <div class="summary-card">
              <span class="summary-label">Unavailable</span>
              <span id="hidden-count" class="summary-value">0</span>
            </div>

            <div class="summary-card">
              <span class="summary-label">Total</span>
              <span id="total-count" class="summary-value">0</span>
            </div>
          </div>

          <div class="progress-section obtainable-progress-section">
            <div class="progress-header">
              <span>Obtainable Progress</span>
              <span id="obtainable-progress-text">0 / 0</span>
            </div>
            <div class="progress-bar">
              <div id="obtainable-progress-fill" class="progress-fill"></div>
            </div>
          </div>

          <section class="pokemon-section">
            <h2>Obtainable</h2>
            <div id="pokemon-list"></div>
          </section>

          <section class="pokemon-section">
            <h2>Unavailable</h2>
            <div id="unavailable-pokemon-list"></div>
          </section>
        </div>

        <div id="pokemon-details" class="details-panel">
          <p>Select a Pokémon's info button to see details.</p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
